<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutsalBook Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;height:100%;}
body{font-family:'DM Sans',sans-serif;background:#060D1A;color:#E2E8F0;height:100%;overflow:hidden;}
input,button,select,textarea{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:4px;}
:root{
  --bg:#060D1A;--bg2:#0A1628;--bg3:#0F1F35;--bg4:#1a2d45;
  --blue:#3B82F6;--blue2:#2563EB;--bl:#93C5FD;
  --green:#10B981;--greenb:#064E3B;
  --yellow:#F59E0B;--yellowb:#451A03;
  --red:#EF4444;--redb:#450A0A;
  --purple:#8B5CF6;--purpleb:#2E1065;
  --white:#F8FAFC;--gray:#64748B;--gl:#1E293B;
  --f:'DM Sans',sans-serif;--fd:'Syne',sans-serif;--fm:'DM Mono',monospace;
}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--gl);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--gl);display:flex;align-items:center;gap:10px;}
.sidebar-logo-icon{width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sidebar-logo-text{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--white);}
.sidebar-logo-badge{font-size:9px;font-weight:700;background:var(--red);color:#fff;border-radius:4px;padding:2px 5px;margin-left:2px;}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto;}
.nav-section{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:2px;text-transform:uppercase;padding:12px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray);transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:var(--f);}
.nav-item:hover{background:var(--bg3);color:var(--white);}
.nav-item.active{background:rgba(59,130,246,.15);color:var(--blue);}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;}
.nav-badge.blue{background:var(--blue);}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--gl);}
.admin-profile{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;}
.admin-avatar{width:32px;height:32px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.admin-name{font-size:13px;font-weight:600;color:var(--white);}
.admin-role{font-size:11px;color:var(--gray);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--gl);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.topbar-title{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--white);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-btn{background:var(--bg3);border:1px solid var(--gl);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--white);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
.topbar-btn:hover{background:var(--bg4);}
.topbar-btn.primary{background:var(--blue);border-color:var(--blue);}
.topbar-btn.primary:hover{background:var(--blue2);}
.content{flex:1;overflow-y:auto;padding:24px;}

/* CARDS STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--bg2);border:1px solid var(--gl);border-radius:16px;padding:20px;}
.stat-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.stat-delta{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;}
.stat-delta.up{background:rgba(16,185,129,.15);color:var(--green);}
.stat-delta.down{background:rgba(239,68,68,.15);color:var(--red);}
.stat-val{font-family:var(--fd);font-size:28px;font-weight:800;color:var(--white);margin-bottom:4px;}
.stat-lbl{font-size:12px;color:var(--gray);}

/* TABLES */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--white);}
.section-actions{display:flex;gap:8px;}
.table-wrap{background:var(--bg2);border:1px solid var(--gl);border-radius:16px;overflow:hidden;margin-bottom:24px;}
.table-search{padding:14px 16px;border-bottom:1px solid var(--gl);display:flex;gap:10px;align-items:center;}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--gl);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--white);outline:none;}
.search-input::placeholder{color:var(--gray);}
.search-input:focus{border-color:var(--blue);}
.filter-select{background:var(--bg3);border:1px solid var(--gl);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--white);outline:none;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
thead th{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px;padding:12px 16px;text-align:left;border-bottom:1px solid var(--gl);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--gl);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:12px 16px;font-size:13px;color:#CBD5E1;}
.td-name{font-weight:600;color:var(--white);}
.td-mono{font-family:var(--fm);font-size:12px;color:var(--gray);}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;}
.badge-green{background:rgba(16,185,129,.15);color:var(--green);}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue);}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow);}
.badge-red{background:rgba(239,68,68,.15);color:var(--red);}
.badge-purple{background:rgba(139,92,246,.15);color:var(--purple);}
.badge-gray{background:rgba(100,116,139,.15);color:var(--gray);}

/* ACTION BUTTONS */
.action-btns{display:flex;gap:6px;}
.action-btn{background:transparent;border:1px solid var(--gl);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .15s;font-family:var(--f);}
.action-btn:hover{background:var(--bg3);color:var(--white);}
.action-btn.edit:hover{border-color:var(--blue);color:var(--blue);}
.action-btn.delete:hover{border-color:var(--red);color:var(--red);}
.action-btn.view:hover{border-color:var(--green);color:var(--green);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--gl);border-radius:20px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gl);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--fd);font-size:17px;font-weight:800;color:var(--white);}
.modal-close{background:var(--bg3);border:1px solid var(--gl);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);font-size:16px;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gl);display:flex;gap:10px;justify-content:flex-end;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:600;color:var(--gray);margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--gl);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--white);outline:none;transition:border .15s;}
.form-input:focus{border-color:var(--blue);}
.form-input::placeholder{color:var(--gray);}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--gl);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--white);outline:none;cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:var(--f);transition:all .15s;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue2);}
.btn-secondary{background:var(--bg3);color:var(--gray);border:1px solid var(--gl);}
.btn-secondary:hover{color:var(--white);}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}

/* CHARTS MINI */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:40px;}
.mini-bar{flex:1;background:rgba(59,130,246,.3);border-radius:3px 3px 0 0;transition:background .15s;}
.mini-bar:hover{background:var(--blue);}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:20px;}
.tab{flex:1;padding:8px 0;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);background:transparent;color:var(--gray);transition:all .15s;}
.tab.active{background:var(--bg2);color:var(--white);}

/* ROLE SELECTOR */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.role-option{background:var(--bg3);border:1px solid var(--gl);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;text-align:center;}
.role-option.selected{border-color:var(--blue);background:rgba(59,130,246,.1);}
.role-option-icon{font-size:22px;margin-bottom:6px;}
.role-option-label{font-size:12px;font-weight:700;color:var(--white);}
.role-option-desc{font-size:10px;color:var(--gray);margin-top:2px;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--gray);}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty-state-title{font-size:15px;font-weight:600;color:var(--white);margin-bottom:6px;}
.empty-state-desc{font-size:13px;line-height:1.6;}

/* ALERT */
.alert{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green);}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.login-card{width:380px;background:var(--bg2);border:1px solid var(--gl);border-radius:20px;padding:36px 32px;}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.login-logo-icon{width:44px;height:44px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.login-logo-text{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--white);}
.login-title{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--white);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--gray);margin-bottom:24px;}

/* RESPONSIVE */
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){.sidebar{display:none;}.stats-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useCallback}=React;

// SUPABASE
const SUPABASE_URL='https://bidfycywjgtlwvergnvi.supabase.co';
const SUPABASE_KEY='sb_publishable_hWf_53K3izVx3y7yE58mkA_bIL6vMz_';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ADMIN CREDENTIALS (à remplacer par Supabase Auth plus tard)
const ADMIN_EMAIL='matt@futsalbook.com';
const ADMIN_PASSWORD='FutsalBook2026!';

// ─── DONNÉES DEMO ─────────────────────────────────────
const DEMO_USERS=[
  {id:1,name:'Matt R.',email:'matt@zebratack.be',role:'capitaine',equipe:'Zebratack Charleroi',status:'actif',itsme:true,created:'2026-01-15'},
  {id:2,name:'Marc D.',email:'gerant@jumet.be',role:'gerant',salle:'Salle Omnisports Jumet',status:'actif',itsme:false,created:'2026-01-20'},
  {id:3,name:'Kevin D.',email:'kevin@gilly.be',role:'capitaine',equipe:'US Gilly Futsal',status:'actif',itsme:true,created:'2026-02-01'},
  {id:4,name:'Sophie M.',email:'sophie@bfa.be',role:'federation',federation:'BFA',status:'actif',itsme:true,created:'2026-02-10'},
  {id:5,name:'Jean P.',email:'jean@racing.be',role:'capitaine',equipe:'Racing Châtelet',status:'inactif',itsme:false,created:'2026-02-15'},
];
const DEMO_SALLES=[
  {id:1,nom:'Salle Omnisports Jumet',ville:'Jumet',terrains:2,prix:60,gerant:'Marc D.',status:'actif',verified:true,abonnement:'standard',reservations:24},
  {id:2,nom:'Centre Sportif Gilly',ville:'Gilly',terrains:1,prix:55,gerant:'—',status:'actif',verified:true,abonnement:'pro',reservations:18},
  {id:3,nom:'Hall Sportif Châtelet',ville:'Châtelet',terrains:3,prix:50,gerant:'—',status:'actif',verified:false,abonnement:'standard',reservations:12},
  {id:4,nom:'Complexe Farciennes',ville:'Farciennes',terrains:2,prix:45,gerant:'—',status:'inactif',verified:false,abonnement:'standard',reservations:3},

  {id:1,nom:'Zebratack Charleroi',ligue:'BFA',division:'P2',capitaine:'Matt R.',joueurs:10,matchs:8,status:'actif'},
  {id:2,nom:'US Gilly Futsal',ligue:'BFA',division:'P2',capitaine:'Kevin D.',joueurs:9,matchs:7,status:'actif'},
  {id:3,nom:'Racing Châtelet',ligue:'LFFS',division:'P3 Hainaut',capitaine:'Jean P.',joueurs:8,matchs:6,status:'actif'},
  {id:4,nom:'FC Marchienne',ligue:'UFF89',division:'Série A',capitaine:'—',joueurs:11,matchs:9,status:'actif'},
];
const DEMO_RESERVATIONS=[
  {id:1,ref:'FB-260518-A1B2C3',equipe:'Zebratack Charleroi',salle:'Salle Jumet',date:'2026-05-20',heure:'20h00',montant:60,commission:6,statut:'confirme'},
  {id:2,ref:'FB-260519-D4E5F6',equipe:'US Gilly Futsal',salle:'Centre Gilly',date:'2026-05-21',heure:'19h00',montant:55,commission:5.5,statut:'confirme'},
  {id:3,ref:'FB-260520-G7H8I9',equipe:'Racing Châtelet',salle:'Hall Châtelet',date:'2026-05-22',heure:'21h00',montant:50,commission:5,statut:'en_attente'},
  {id:4,ref:'FB-260521-J1K2L3',equipe:'FC Marchienne',salle:'Salle Jumet',date:'2026-05-23',heure:'18h00',montant:60,commission:6,statut:'annule'},
];

// ─── HELPERS ──────────────────────────────────────────
const Badge=({type,children})=>{
  const map={actif:'badge-green',inactif:'badge-gray',confirme:'badge-green',en_attente:'badge-yellow',annule:'badge-red',standard:'badge-blue',pro:'badge-purple',capitaine:'badge-blue',gerant:'badge-green',federation:'badge-purple',admin:'badge-red',BFA:'badge-blue',UFF89:'badge-yellow',LFFS:'badge-green'};
  return <span className={`badge ${map[type]||'badge-gray'}`}>{children}</span>;
};

const Modal=({title,onClose,children,footer})=>(
  <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="modal-header">
        <div className="modal-title">{title}</div>
        <button className="modal-close" onClick={onClose}>✕</button>
      </div>
      <div className="modal-body">{children}</div>
      {footer&&<div className="modal-footer">{footer}</div>}
    </div>
  </div>
);

// ─── LOGIN ────────────────────────────────────────────
const Login=({onLogin})=>{
  const [email,setEmail]=useState('');
  const [pwd,setPwd]=useState('');
  const [err,setErr]=useState('');
  const [load,setLoad]=useState(false);
  const doLogin=()=>{
    if(!email||!pwd){setErr('Remplis tous les champs.');return;}
    setLoad(true);setErr('');
    setTimeout(()=>{
      if(email===ADMIN_EMAIL&&pwd===ADMIN_PASSWORD){onLogin({name:'Matt R.',email,role:'admin'});}
      else{setErr('Email ou mot de passe incorrect.');setLoad(false);}
    },800);
  };
  return(
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon">⚽</div>
          <div className="login-logo-text">FutsalBook</div>
        </div>
        <div className="login-title">Panel Admin</div>
        <div className="login-sub">Accès réservé aux administrateurs FutsalBook.</div>
        {err&&<div className="alert alert-error">⚠ {err}</div>}
        <div className="form-group">
          <label className="form-label">Email administrateur</label>
          <input className="form-input" type="email" placeholder="admin@futsalbook.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
        </div>
        <div className="form-group">
          <label className="form-label">Mot de passe</label>
          <input className="form-input" type="password" placeholder="••••••••" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
        </div>
        <button className="btn btn-primary" style={{width:'100%',marginTop:8}} onClick={doLogin} disabled={load}>{load?'Connexion...':'Se connecter →'}</button>
        <div style={{fontSize:11,color:'var(--gray)',textAlign:'center',marginTop:14}}>Démo : matt@futsalbook.com / FutsalBook2026!</div>
      </div>
    </div>
  );
};

// ─── DASHBOARD HOME ───────────────────────────────────
const DashboardHome=()=>{
  const stats=[
    {icon:'👥',val:'247',lbl:'Utilisateurs inscrits',delta:'+12 ce mois',up:true,color:'#1E3A5F'},
    {icon:'🏟️',val:'4',lbl:'Salles partenaires',delta:'+1 ce mois',up:true,color:'#064E3B'},
    {icon:'⚽',val:'18',lbl:'Équipes actives',delta:'+3 ce mois',up:true,color:'#2E1065'},
    {icon:'💰',val:'1 440€',lbl:'Revenus ce mois',delta:'+18% vs mois dernier',up:true,color:'#451A03'},
  ];
  const bars=[30,45,60,40,80,95,70,85,60,90,75,100];
  return(
    <div>
      <div className="stats-grid">
        {stats.map(s=>(
          <div key={s.lbl} className="stat-card">
            <div className="stat-card-top">
              <div className="stat-icon" style={{background:s.color}}>{s.icon}</div>
              <span className={`stat-delta ${s.up?'up':'down'}`}>{s.delta}</span>
            </div>
            <div className="stat-val">{s.val}</div>
            <div className="stat-lbl">{s.lbl}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:24}}>
        <div className="table-wrap" style={{marginBottom:0}}>
          <div style={{padding:'16px 20px',borderBottom:'1px solid var(--gl)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontFamily:'var(--fd)',fontSize:14,fontWeight:800,color:'var(--white)'}}>Réservations récentes</div>
            <span style={{fontSize:12,color:'var(--blue)',cursor:'pointer'}}>Tout voir</span>
          </div>
          <table>
            <thead><tr><th>Référence</th><th>Équipe</th><th>Salle</th><th>Montant</th><th>Statut</th></tr></thead>
            <tbody>
              {DEMO_RESERVATIONS.map(r=>(
                <tr key={r.id}>
                  <td className="td-mono">{r.ref}</td>
                  <td className="td-name">{r.equipe}</td>
                  <td>{r.salle}</td>
                  <td>{r.montant}€</td>
                  <td><Badge type={r.statut}>{r.statut==='confirme'?'Confirmé':r.statut==='en_attente'?'En attente':'Annulé'}</Badge></td>
                </tr>
              ))}
            </tbody>
          </table>

const UsersPage=()=>{
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('tous');
  const [modal,setModal]=useState(false);
  const [editUser,setEditUser]=useState(null);
  const [alert,setAlert]=useState(null);
  const [form,setForm]=useState({name:'',email:'',role:'capitaine',equipe:'',salle:'',federation:''});
  const [selRole,setSelRole]=useState('capitaine');

  const filtered=DEMO_USERS.filter(u=>{
    const matchSearch=u.name.toLowerCase().includes(search.toLowerCase())||u.email.toLowerCase().includes(search.toLowerCase());
    const matchFilter=filter==='tous'||u.role===filter;
    return matchSearch&&matchFilter;
  });

  const openAdd=()=>{setEditUser(null);setForm({name:'',email:'',role:'capitaine',equipe:'',salle:'',federation:''});setSelRole('capitaine');setModal(true);};
  const openEdit=(u)=>{setEditUser(u);setForm({name:u.name,email:u.email,role:u.role,equipe:u.equipe||'',salle:u.salle||'',federation:u.federation||''});setSelRole(u.role);setModal(true);};
  const save=()=>{setAlert({type:'success',msg:editUser?`Utilisateur ${form.name} modifié.`:`Utilisateur ${form.name} créé.`});setModal(false);setTimeout(()=>setAlert(null),3000);};

  const roles=[
    {id:'capitaine',icon:'🛡️',label:'Capitaine',desc:'Gère une équipe'},
    {id:'gerant',icon:'🏟️',label:'Gérant de salle',desc:'Gère une salle'},
    {id:'federation',icon:'🏅',label:'Gestionnaire fédération',desc:'Gère BFA/UFF89/LFFS'},
    {id:'admin',icon:'⚙️',label:'Administrateur',desc:'Accès complet'},
  ];

  return(
    <div>
      {alert&&<div className={`alert alert-${alert.type}`}>{alert.type==='success'?'✓':' ⚠'} {alert.msg}</div>}
      <div className="section-header">
        <div className="section-title">Utilisateurs <span style={{fontSize:13,color:'var(--gray)',fontFamily:'var(--f)',fontWeight:400}}>({DEMO_USERS.length})</span></div>
        <button className="topbar-btn primary" onClick={openAdd}>+ Ajouter un utilisateur</button>
      </div>
      <div className="table-wrap">
        <div className="table-search">
          <input className="search-input" placeholder="🔍 Rechercher un utilisateur..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select className="filter-select" value={filter} onChange={e=>setFilter(e.target.value)}>
            <option value="tous">Tous les rôles</option>
            <option value="capitaine">Capitaines</option>
            <option value="gerant">Gérants</option>
            <option value="federation">Fédérations</option>
            <option value="admin">Admins</option>
          </select>
        </div>
        <table>
          <thead><tr><th>Utilisateur</th><th>Rôle</th><th>Affectation</th><th>itsme</th><th>Statut</th><th>Inscrit le</th><th>Actions</th></tr></thead>
          <tbody>
            {filtered.map(u=>(
              <tr key={u.id}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:32,height:32,background:'var(--bg4)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'var(--blue)',flexShrink:0}}>{u.name.slice(0,2).toUpperCase()}</div>
                    <div>
                      <div className="td-name">{u.name}</div>
                      <div className="td-mono">{u.email}</div>
                    </div>
                  </div>
                </td>
                <td><Badge type={u.role}>{u.role==='capitaine'?'Capitaine':u.role==='gerant'?'Gérant':u.role==='federation'?'Fédération':'Admin'}</Badge></td>
                <td style={{fontSize:13,color:'var(--gray)'}}>{u.equipe||u.salle||u.federation||'—'}</td>
                <td>{u.itsme?<span style={{color:'var(--green)',fontWeight:700}}>✓ Vérifié</span>:<span style={{color:'var(--gray)'}}>Non vérifié</span>}</td>
                <td><Badge type={u.status}>{u.status==='actif'?'Actif':'Inactif'}</Badge></td>
                <td className="td-mono">{u.created}</td>
                <td>
                  <div className="action-btns">
                    <button className="action-btn edit" onClick={()=>openEdit(u)}>✏️ Modifier</button>
                    <button className="action-btn delete">🗑️</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal&&(
        <Modal title={editUser?'Modifier l\'utilisateur':'Ajouter un utilisateur'} onClose={()=>setModal(false)}
          footer={<><button className="btn btn-secondary" onClick={()=>setModal(false)}>Annuler</button><button className="btn btn-primary" onClick={save}>💾 {editUser?'Sauvegarder':'Créer'}</button></>}>
          <div className="form-group">
            <label className="form-label">Rôle</label>
            <div className="role-grid">
              {roles.map(r=>(
                <div key={r.id} className={`role-option ${selRole===r.id?'selected':''}`} onClick={()=>{setSelRole(r.id);setForm({...form,role:r.id});}}>
                  <div className="role-option-icon">{r.icon}</div>
                  <div className="role-option-label">{r.label}</div>
                  <div className="role-option-desc">{r.desc}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Nom complet</label>
              <input className="form-input" placeholder="Prénom Nom" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="form-label">Email</label>
              <input className="form-input" type="email" placeholder="email@exemple.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
            </div>
          </div>
          {selRole==='gerant'&&(
            <div className="form-group">
              <label className="form-label">Affecter à une salle</label>
              <select className="form-select" value={form.salle} onChange={e=>setForm({...form,salle:e.target.value})}>
                <option value="">-- Choisir une salle --</option>
                {DEMO_SALLES.map(s=><option key={s.id} value={s.nom}>{s.nom}</option>)}
              </select>
            </div>
          )}
          {selRole==='federation'&&(
            <div className="form-group">
              <label className="form-label">Affecter à une fédération</label>
              <select className="form-select" value={form.federation} onChange={e=>setForm({...form,federation:e.target.value})}>
                <option value="">-- Choisir une fédération --</option>
                <option value="BFA">BFA — Belgium Futsal Association</option>
                <option value="UFF89">UFF89 — Union Francophone de Futsal</option>
                <option value="LFFS">LFFS — Ligue Francophone de Football en Salle</option>
              </select>
            </div>
          )}
          {selRole==='capitaine'&&(
            <div className="form-group">
              <label className="form-label">Équipe (optionnel)</label>
              <input className="form-input" placeholder="Nom de l'équipe" value={form.equipe} onChange={e=>setForm({...form,equipe:e.target.value})}/>
            </div>
          )}
        </Modal>
      )}
    </div>
  );
};

          <div className="stat-card-top">
            <div className="stat-icon" style={{background:s.color}}>{s.icon}</div>
            <span className={`stat-delta ${s.up?'up':'down'}`}>{s.delta}</span>
          </div>
          <div className="stat-val">{s.val}</div>
          <div className="stat-lbl">{s.lbl}</div>
        </div>
      ))}
    </div>
    <div className="section-header"><div className="section-title">Réservations & commissions</div></div>
    <div className="table-wrap">
      <table>
        <thead><tr><th>Référence</th><th>Équipe</th><th>Salle</th><th>Date</th><th>Montant</th><th>Commission (10%)</th><th>Salle reçoit</th><th>Statut</th></tr></thead>
        <tbody>
          {DEMO_RESERVATIONS.map(r=>(
            <tr key={r.id}>
              <td className="td-mono">{r.ref}</td>
              <td className="td-name">{r.equipe}</td>
              <td>{r.salle}</td>
              <td>{r.date} {r.heure}</td>
              <td style={{fontWeight:700,color:'var(--white)'}}>{r.montant}€</td>
              <td style={{color:'var(--blue)',fontWeight:700}}>{r.commission}€</td>
              <td style={{color:'var(--green)',fontWeight:700}}>{r.montant-r.commission}€</td>
              <td><Badge type={r.statut}>{r.statut==='confirme'?'Confirmé':r.statut==='en_attente'?'En attente':'Annulé'}</Badge></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
    <div className="section-header"><div className="section-title">Virements à effectuer</div><button className="topbar-btn primary">+ Déclencher virements</button></div>
    <div className="table-wrap">
      <table>
        <thead><tr><th>Salle</th><th>Période</th><th>Réservations</th><th>Montant brut</th><th>Commission</th><th>À virer</th><th>Action</th></tr></thead>
        <tbody>
          {[{salle:'Salle Jumet',periode:'Mai 2026',nb:6,brut:360,comm:36,net:324},{salle:'Centre Gilly',periode:'Mai 2026',nb:4,brut:220,comm:22,net:198}].map(v=>(
            <tr key={v.salle}>
              <td className="td-name">{v.salle}</td>
              <td>{v.periode}</td>
              <td>{v.nb}</td>
              <td>{v.brut}€</td>
              <td style={{color:'var(--blue)'}}>{v.comm}€</td>
              <td style={{color:'var(--green)',fontWeight:700}}>{v.net}€</td>
              <td><button className="topbar-btn" style={{padding:'5px 12px',fontSize:12}}>💸 Virer</button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </div>
);

// ─── SETTINGS PAGE ────────────────────────────────────
const SettingsPage=()=>(
  <div>
    <div className="section-title" style={{marginBottom:20}}>Paramètres généraux</div>
    {[
      {title:'Modèle de commission',desc:'Taux appliqué sur chaque réservation',items:[['Commission standard','10%'],['Commission Pro (avec abonnement)','7%'],['Période gratuite salles','6 mois'],['Abonnement Pro mensuel','29€/mois']]},
      {title:'Supabase',desc:'Connexion base de données',items:[['URL','bidfycywjgtlwvergnvi.supabase.co'],['Statut','✅ Connecté'],['Tables','19 tables créées'],['Région','West EU (Ireland)']]},
      {title:'Domaine',desc:'Configuration du site',items:[['Domaine principal','futsalbook.com'],['Hébergement','Vercel'],['SSL','✅ HTTPS actif'],['DNS','OVH']]},
    ].map(section=>(
      <div key={section.title} className="table-wrap" style={{marginBottom:16}}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid var(--gl)'}}>
          <div style={{fontFamily:'var(--fd)',fontSize:15,fontWeight:800,color:'var(--white)'}}>{section.title}</div>
          <div style={{fontSize:12,color:'var(--gray)',marginTop:2}}>{section.desc}</div>
        </div>
        <div style={{padding:'8px 0'}}>
          {section.items.map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 20px',borderBottom:'1px solid var(--gl)',fontSize:13}}>
              <span style={{color:'var(--gray)'}}>{l}</span>
              <span style={{fontWeight:700,color:'var(--white)',fontFamily:'var(--fm)'}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    ))}
  </div>
);

// ─── MAIN APP ─────────────────────────────────────────
const NAV=[
  {section:'Vue globale',items:[{id:'home',icon:'📊',label:'Dashboard'},{id:'activite',icon:'🔔',label:'Activité',badge:'5'}]},
  {section:'Gestion',items:[{id:'users',icon:'👥',label:'Utilisateurs',badge:'3',badgeColor:'blue'},{id:'salles',icon:'🏟️',label:'Salles'},{id:'equipes',icon:'⚽',label:'Équipes'},{id:'federations',icon:'🏅',label:'Fédérations'}]},
  {section:'Finances',items:[{id:'finances',icon:'💰',label:'Finances'},{id:'virements',icon:'🏦',label:'Virements'}]},
  {section:'Système',items:[{id:'settings',icon:'⚙️',label:'Paramètres'},{id:'logs',icon:'📋',label:'Logs'}]},
];

const PAGE_TITLES={home:'Dashboard',users:'Utilisateurs',salles:'Salles partenaires',equipes:'Équipes',federations:'Fédérations',finances:'Finances',settings:'Paramètres',activite:'Activité',virements:'Virements',logs:'Logs système'};

function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('home');

  const renderPage=()=>{
    switch(page){
      case 'home': return <DashboardHome/>;
      case 'users': return <UsersPage/>;
      case 'salles': return <SallesPage/>;
      case 'equipes': return <EquipesPage/>;
      case 'federations': return <FederationsPage/>;
      case 'finances': return <FinancesPage/>;
      case 'settings': return <SettingsPage/>;
      default: return <div className="empty-state"><div className="empty-state-icon">🚧</div><div className="empty-state-title">En construction</div><div className="empty-state-desc">Cette section arrive bientôt.</div></div>;
    }
  };

  if(!user) return <Login onLogin={setUser}/>;

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon">⚽</div>
          <div>
            <div className="sidebar-logo-text">FutsalBook</div>
          </div>
          <span className="sidebar-logo-badge">ADMIN</span>
        </div>
        <nav className="sidebar-nav">
          {NAV.map(section=>(
            <div key={section.section}>
              <div className="nav-section">{section.section}</div>
              {section.items.map(item=>(
                <button key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>setPage(item.id)}>
                  <span className="nav-icon">{item.icon}</span>
                  {item.label}
                  {item.badge&&<span className={`nav-badge ${item.badgeColor||''}`}>{item.badge}</span>}
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="admin-profile">
            <div className="admin-avatar">{user.name.slice(0,2).toUpperCase()}</div>
            <div>
              <div className="admin-name">{user.name}</div>
              <div className="admin-role">Administrateur</div>
            </div>
          </div>
          <button className="nav-item" style={{color:'var(--red)'}} onClick={()=>setUser(null)}>
            <span className="nav-icon">🚪</span>Se déconnecter
          </button>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{PAGE_TITLES[page]||page}</div>
          <div className="topbar-right">
            <button className="topbar-btn" onClick={()=>window.open('https://futsalbook.com','_blank')}>🌐 Voir le site</button>
            <button className="topbar-btn" onClick={()=>window.open('https://supabase.com/dashboard','_blank')}>🗄️ Supabase</button>
          </div>
        </div>
        <div className="content">{renderPage()}</div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
