<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:#060D1A;color:#E2E8F0;overflow:hidden;}
input,button,select,textarea{font-family:"DM Sans",sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:4px;}
:root{
--bg:#060D1A;--bg2:#0A1628;--bg3:#0F1F35;--bg4:#1a2d45;
--blue:#3B82F6;--blue2:#2563EB;--bl:#93C5FD;
--green:#10B981;--red:#EF4444;--yellow:#F59E0B;--purple:#8B5CF6;
--white:#F8FAFC;--gray:#64748B;--gl:#1E293B;
--f:"DM Sans",sans-serif;--fd:"Exo 2",sans-serif;--fm:"DM Mono",monospace;
}
.app{display:flex;height:100vh;overflow:hidden;}
/* SIDEBAR */
.sb{width:240px;background:var(--bg2);border-right:1px solid var(--gl);display:flex;flex-direction:column;flex-shrink:0;}
.sb-logo{padding:18px 16px;border-bottom:1px solid var(--gl);display:flex;align-items:center;gap:10px;}
.sb-logo img{width:34px;height:34px;object-fit:contain;border-radius:8px;flex-shrink:0;}
.sb-logo-t{font-family:var(--fd);font-size:17px;font-weight:900;color:var(--white);}
.sb-badge{font-size:9px;font-weight:700;background:var(--red);color:#fff;border-radius:4px;padding:2px 5px;}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.sb-sec{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:2px;text-transform:uppercase;padding:12px 12px 5px;}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray);transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:var(--f);}
.ni:hover{background:var(--bg3);color:var(--white);}
.ni.active{background:rgba(59,130,246,.15);color:var(--blue);font-weight:700;}
.ni-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;}
.ni-badge.b{background:var(--blue);}
.ni-badge.g{background:var(--green);}
.sb-foot{padding:10px 8px;border-top:1px solid var(--gl);}
.ap{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;}
.ap-av{width:32px;height:32px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.ap-name{font-family:var(--fd);font-size:13px;font-weight:800;color:var(--white);}
.ap-role{font-size:11px;color:var(--gray);}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tb{height:56px;background:var(--bg2);border-bottom:1px solid var(--gl);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.tb-title{font-family:var(--fd);font-size:20px;font-weight:900;color:var(--white);}
.tb-right{display:flex;align-items:center;gap:10px;}
.btn-tb{background:var(--bg3);border:1px solid var(--gl);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--white);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;font-family:var(--f);}
.btn-tb:hover{background:var(--bg4);}
.btn-tb.p{background:var(--blue);border-color:var(--blue);}
.btn-tb.p:hover{background:var(--blue2);}
.btn-tb.red{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:var(--red);}
.content{flex:1;overflow-y:auto;padding:24px;}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.sc{background:var(--bg2);border:1px solid var(--gl);border-radius:16px;padding:18px;}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.sc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.delta{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;}
.delta.up{background:rgba(16,185,129,.15);color:var(--green);}
.delta.down{background:rgba(239,68,68,.15);color:var(--red);}
.sc-val{font-family:var(--fd);font-size:26px;font-weight:900;color:var(--white);margin-bottom:3px;}
.sc-lbl{font-size:12px;color:var(--gray);}
/* TABLE */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sh-title{font-family:var(--fd);font-size:17px;font-weight:900;color:var(--white);}
.tw{background:var(--bg2);border:1px solid var(--gl);border-radius:16px;overflow:hidden;margin-bottom:22px;}
.ts{padding:12px 16px;border-bottom:1px solid var(--gl);display:flex;gap:10px;align-items:center;}
.si{flex:1;background:var(--bg3);border:1px solid var(--gl);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--white);outline:none;font-family:var(--f);}
.si::placeholder{color:var(--gray);}
.si:focus{border-color:var(--blue);}
.fs{background:var(--bg3);border:1px solid var(--gl);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--white);outline:none;cursor:pointer;font-family:var(--f);}
table{width:100%;border-collapse:collapse;}
thead th{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px;padding:11px 16px;text-align:left;border-bottom:1px solid var(--gl);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--gl);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:11px 16px;font-size:13px;color:#CBD5E1;}
.tn{font-weight:700;color:var(--white);font-family:var(--fd);}
.tm{font-family:var(--fm);font-size:11px;color:var(--gray);}
/* BADGES */
.bdg{display:inline-flex;align-items:center;font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;}
.bg{background:rgba(16,185,129,.15);color:var(--green);}
.bb{background:rgba(59,130,246,.15);color:var(--blue);}
.by{background:rgba(245,158,11,.15);color:var(--yellow);}
.br{background:rgba(239,68,68,.15);color:var(--red);}
.bp2{background:rgba(139,92,246,.15);color:var(--purple);}
.bgr{background:rgba(100,116,139,.15);color:var(--gray);}
.bo{background:rgba(249,115,22,.15);color:#F97316;}
/* ACTION BTNS */
.ab{display:flex;gap:5px;}
.ab-btn{background:transparent;border:1px solid var(--gl);border-radius:6px;padding:5px 9px;font-size:11px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .15s;font-family:var(--f);}
.ab-btn:hover{background:var(--bg3);color:var(--white);}
.ab-btn.e:hover{border-color:var(--blue);color:var(--blue);}
.ab-btn.d:hover{border-color:var(--red);color:var(--red);}
.ab-btn.v:hover{border-color:var(--green);color:var(--green);}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.mc{background:var(--bg2);border:1px solid var(--gl);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.mh{padding:18px 24px;border-bottom:1px solid var(--gl);display:flex;align-items:center;justify-content:space-between;}
.mh-t{font-family:var(--fd);font-size:18px;font-weight:900;color:var(--white);}
.mx{background:var(--bg3);border:1px solid var(--gl);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);font-size:15px;line-height:1;}
.mb{padding:22px;}
.mf{padding:14px 22px;border-top:1px solid var(--gl);display:flex;gap:10px;justify-content:flex-end;}
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:700;color:var(--gray);margin-bottom:5px;display:block;letter-spacing:.5px;text-transform:uppercase;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--gl);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--white);outline:none;transition:border .15s;font-family:var(--f);}
.fi:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--gray);}
.fsel{width:100%;background:var(--bg3);border:1px solid var(--gl);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--white);outline:none;cursor:pointer;font-family:var(--f);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:var(--f);transition:all .15s;}
.btn-p{background:var(--blue);color:#fff;}
.btn-p:hover{background:var(--blue2);}
.btn-s{background:var(--bg3);color:var(--gray);border:1px solid var(--gl);}
.btn-s:hover{color:var(--white);}
/* ROLE CARDS */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.ro{background:var(--bg3);border:1px solid var(--gl);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;text-align:center;}
.ro.sel{border-color:var(--blue);background:rgba(59,130,246,.1);}
.ro-i{font-size:20px;margin-bottom:5px;}
.ro-l{font-size:12px;font-weight:700;color:var(--white);font-family:var(--fd);}
.ro-d{font-size:10px;color:var(--gray);margin-top:2px;}
/* ALERT */
.al{padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.al.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green);}
.al.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);}
/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.lc{width:400px;background:var(--bg2);border:1px solid var(--gl);border-radius:24px;padding:40px 36px;}
.ll{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.ll img{width:48px;height:48px;object-fit:contain;border-radius:12px;}
.ll-t{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--white);}
.ll-b{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:6px;padding:3px 8px;}
/* MINI CHART */
.mc2{display:flex;align-items:flex-end;gap:3px;height:40px;}
.mb2{flex:1;background:rgba(59,130,246,.3);border-radius:3px 3px 0 0;transition:background .15s;}
.mb2:hover{background:var(--blue);}
/* PRIX CARDS */
.pg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
.pc{background:var(--bg3);border:1px solid var(--gl);border-radius:14px;padding:16px;}
.pc.std{border-color:var(--blue);background:rgba(59,130,246,.06);}
.pc.pro{border-color:var(--green);background:rgba(16,185,129,.06);}
.pc.club{border-color:var(--purple);background:rgba(139,92,246,.06);}
.pc-n{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.pc-v{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--white);margin-bottom:2px;}
.pc-c{font-size:11px;color:var(--gray);margin-bottom:10px;}
.pc-l{list-style:none;}
.pc-l li{font-size:11px;color:var(--gray);padding:4px 0;border-bottom:1px solid var(--gl);display:flex;align-items:center;gap:5px;}
.pc-l li::before{content:"✓";font-weight:700;font-size:10px;}
.pc.std .pc-l li::before{color:var(--blue);}
.pc.pro .pc-l li::before{color:var(--green);}
.pc.club .pc-l li::before{color:var(--purple);}
/* INFO BOX */
.ib{background:var(--bg3);border:1px solid var(--gl);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px;}
.ib-icon{font-size:20px;flex-shrink:0;}
.ib-text{font-size:13px;color:var(--gray);line-height:1.6;}
.ib-text strong{color:var(--white);}
/* FED */
.fed-card{background:var(--bg2);border:1px solid var(--gl);border-radius:16px;margin-bottom:16px;overflow:hidden;}
.fed-header{padding:16px 20px;border-bottom:1px solid var(--gl);display:flex;align-items:center;justify-content:space-between;}
.fed-body{padding:0;}
.fed-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--gl);}
.fed-cell{padding:14px 20px;}
.fed-cell-l{font-size:11px;color:var(--gray);margin-bottom:4px;}
.fed-cell-v{font-size:14px;font-weight:700;color:var(--white);font-family:var(--fd);}
.fed-footer{padding:14px 20px;display:flex;align-items:center;gap:12px;}
/* RESPONSIVE */
@media(max-width:1200px){.sg{grid-template-columns:repeat(2,1fr);}}
@media(max-width:900px){.sb{display:none;}.sg{grid-template-columns:1fr 1fr;}}
</style>
</head>

const Login=({onLogin})=>{
  const [email,setEmail]=useState("");
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const [load,setLoad]=useState(false);
  const go=()=>{
    if(!email||!pwd){setErr("Remplis tous les champs.");return;}
    setLoad(true);setErr("");
    setTimeout(()=>{
      if(email===ADMIN_EMAIL&&pwd===ADMIN_PWD)onLogin({name:"Matt R.",email});
      else{setErr("Email ou mot de passe incorrect.");setLoad(false);}
    },800);
  };
  return(
    <div className="lw">
      <div className="lc">
        <div className="ll">
          <img src={LOGO} alt="FutsalBook"/>
          <div><div className="ll-t">FutsalBook</div><div style={{marginTop:4}}><span className="ll-b">ADMIN</span></div></div>
        </div>
        <div style={{fontFamily:"var(--fd)",fontSize:22,fontWeight:900,color:"var(--white)",marginBottom:6}}>Espace administrateur</div>
        <div style={{fontSize:13,color:"var(--gray)",marginBottom:24}}>Accès réservé — Matt R.</div>

const UsersPage=()=>{

  const filtered=USERS.filter(u=>{
    const ms=u.name.toLowerCase().includes(search.toLowerCase())||u.email.toLowerCase().includes(search.toLowerCase());

    return ms&&mf;

          </select>
        </div>

          <thead><tr><th>Utilisateur</th><th>Rôle</th><th>Affectation</th><th>Plan</th><th>itsme</th><th>Statut</th><th>Date</th><th>Actions</th></tr></thead>

                <td>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>

                <td>{u.itsme?<span style={{color:"var(--green)",fontWeight:700,fontSize:12}}>✓ Vérifié</span>:<span style={{color:"var(--gray)",fontSize:12}}>—</span>}</td>

        </Modal>
      )}

  );

// ── APP ────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("home");

  const render=()=>{
    switch(page){
      case "home": return <Home/>;
      case "users": return <UsersPage/>;
      case "salles": return <SallesPage/>;
      case "equipes": return <EquipesPage/>;
      case "feds": return <FedsPage/>;
      case "finances": return <FinancesPage/>;
      case "tarifs": return <TarifsPage/>;
      case "settings": return <SettingsPage/>;
      default: return <div style={{textAlign:"center",padding:"60px 20px",color:"var(--gray)"}}><div style={{fontSize:40,marginBottom:14}}>🚧</div><div style={{fontFamily:"var(--fd)",fontSize:18,color:"var(--white)",marginBottom:8}}>En construction</div><div>Cette section arrive bientôt.</div></div>;
    }
  };

  if(!user) return <Login onLogin={setUser}/>;

  return(
    <div className="app">
      <div className="sb">
        <div className="sb-logo">
          <img src={LOGO} alt="FutsalBook"/>
          <div><div className="sb-logo-t">FutsalBook</div></div>
          <span className="sb-badge">ADMIN</span>
        </div>
        <nav className="sb-nav">
          {NAV.map(s=>(
            <div key={s.sec}>
              <div className="sb-sec">{s.sec}</div>
              {s.items.map(it=>(
                <button key={it.id} className={`ni ${page===it.id?"active":""}`} onClick={()=>setPage(it.id)}>
                  <span className="ni-icon">{it.icon}</span>
                  {it.label}
                  {it.badge&&<span className={`ni-badge ${it.bc||""}`}>{it.badge}</span>}
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="sb-foot">
          <div className="ap">
            <div className="ap-av">{user.name.slice(0,2).toUpperCase()}</div>
            <div><div className="ap-name">{user.name}</div><div className="ap-role">Administrateur</div></div>
          </div>
          <button className="ni" style={{color:"var(--red)"}} onClick={()=>setUser(null)}>
            <span className="ni-icon">🚪</span>Déconnexion
          </button>
          <button className="ni" onClick={()=>window.open("https://futsalbook.com","_blank")}>
            <span className="ni-icon">🌐</span>Voir le site
          </button>
        </div>
      </div>
      <div className="main">
        <div className="tb">
          <div className="tb-title">{TITLES[page]||page}</div>
          <div className="tb-right">
            <button className="btn-tb" onClick={()=>window.open("https://supabase.com/dashboard","_blank")}>🗄️ Supabase</button>
            <button className="btn-tb" onClick={()=>window.open("https://vercel.com","_blank")}>▲ Vercel</button>
          </div>
        </div>
        <div className="content">{render()}</div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
