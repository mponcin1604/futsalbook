<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#F0F4FF;color:#0D1B3E;overflow-x:hidden;}
input,button,select,textarea{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#3B82F6;border-radius:4px;}
:root{
  --navy:#0D1B3E;--navy2:#0a1628;--blue:#3B82F6;--blue2:#2563EB;--bl:#93C5FD;
  --white:#fff;--bg:#F0F4FF;--bg2:#E8EEF8;--gray:#64748B;--gl:#CBD5E1;--gxl:#E8EEF8;
  --ok:#059669;--okb:#ECFDF5;--okd:#D1FAE5;
  --warn:#D97706;--warnb:#FFFBEB;--warnd:#FDE68A;
  --err:#DC2626;--errb:#FEF2F2;--errd:#FECACA;
  --purple:#8B5CF6;--purpleb:#F5F3FF;
  --ib:#F8FAFF;--f:'DM Sans',sans-serif;--fd:'Exo 2',sans-serif;
}
/* LAYOUT */
.app{display:flex;min-height:100vh;background:var(--bg);}
/* SIDEBAR */
.sidebar{width:240px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;border-right:.5px solid rgba(255,255,255,.08);}
.sb-logo{padding:18px 16px 14px;border-bottom:.5px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;cursor:pointer;}
.sb-logo img{width:32px;height:32px;object-fit:contain;border-radius:7px;flex-shrink:0;}
.sb-logo-t{font-family:var(--fd);font-size:17px;font-weight:900;color:#fff;}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.sb-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;padding:12px 12px 5px;}
.sni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:var(--f);}
.sni:hover{background:rgba(255,255,255,.07);color:#fff;}
.sni.active{background:rgba(59,130,246,.18);color:var(--blue);font-weight:700;}
.sni-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sni-badge{margin-left:auto;background:var(--err);color:#fff;font-size:9px;font-weight:700;border-radius:20px;padding:1px 7px;}
.sni-badge.b{background:var(--blue);}
.sni-badge.ok{background:var(--ok);}
.sb-foot{padding:10px 8px 16px;border-top:.5px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;}
.sb-av{width:32px;height:32px;background:var(--blue);border-radius:50%;display:'flex';align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;display:flex;}
.sb-uname{font-family:var(--fd);font-size:13px;font-weight:800;color:#fff;}
.sb-urole{font-size:10px;color:rgba(255,255,255,.4);}
/* MAIN */
.app-main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:56px;background:#fff;border-bottom:.5px solid var(--gl);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
.tb-title{font-family:var(--fd);font-size:18px;font-weight:900;color:var(--navy);}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-btn{background:var(--bg);border:.5px solid var(--gl);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--f);transition:all .15s;}
.tb-btn:hover{background:var(--bg2);}
.tb-btn.p{background:var(--navy);color:#fff;border-color:var(--navy);}
.tb-btn.blue{background:var(--blue);color:#fff;border-color:var(--blue);}
.notif-wrap{position:relative;cursor:pointer;}
.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--err);border-radius:50%;border:2px solid #fff;}
.content{flex:1;padding:24px;overflow-y:auto;}
/* MOBILE */
.mob-topbar{display:none;background:var(--navy);padding:12px 16px;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.mob-t{font-family:var(--fd);font-size:16px;font-weight:900;color:#fff;flex:1;}
.mob-back{background:rgba(255,255,255,.12);border:none;border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#fff;flex-shrink:0;}
.mob-nav{display:none;background:#fff;border-top:.5px solid var(--gl);padding:8px 0 20px;position:fixed;bottom:0;left:0;right:0;z-index:100;}
.mob-nav-inner{display:flex;justify-content:space-around;}
.mni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:var(--f);color:var(--gray);font-weight:400;min-width:56px;padding:0;}
.mni.active{color:var(--navy);font-weight:700;}
.mni-icon{font-size:22px;}
.mni-lbl{font-size:10px;}
/* CARDS */
.card{background:#fff;border-radius:16px;border:.5px solid var(--gl);padding:20px;margin-bottom:16px;}
.card-t{font-family:var(--fd);font-size:15px;font-weight:800;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
/* STAT */
.smc{background:var(--bg);border-radius:12px;padding:14px;text-align:center;}
.smc-v{font-family:var(--fd);font-size:26px;font-weight:900;color:var(--navy);}
.smc-l{font-size:11px;color:var(--gray);margin-top:3px;}
/* BADGES */
.bdg{display:inline-flex;align-items:center;font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;}
.bdg-ok{background:var(--okb);color:var(--ok);}
.bdg-warn{background:var(--warnb);color:var(--warn);}
.bdg-err{background:var(--errb);color:var(--err);}
.bdg-blue{background:#EEF2FF;color:var(--blue);}
.bdg-gray{background:var(--bg);color:var(--gray);}
.bdg-purple{background:var(--purpleb);color:var(--purple);}
.bdg-navy{background:var(--navy);color:var(--bl);}
/* BUTTONS */
.btn{background:var(--navy);border:none;border-radius:12px;padding:12px 0;font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:var(--f);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;width:100%;}
.btn:hover{opacity:.9;}
.btn.blue{background:var(--blue);}
.btn.ok{background:var(--ok);}
.btn.err{background:var(--err);}
.btn.warn{background:var(--warn);}
.btn.purple{background:var(--purple);}
.btn.out{background:transparent;border:.5px solid var(--gl);color:var(--gray);}
.btn.out:hover{background:var(--bg);}
.bsm{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--f);transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.bsm.navy{background:var(--navy);color:#fff;}
.bsm.blue{background:var(--blue);color:#fff;}
.bsm.ok{background:var(--ok);color:#fff;}
.bsm.err{background:var(--errb);color:var(--err);border:.5px solid var(--errd);}
.bsm.warn{background:var(--warnb);color:var(--warn);border:.5px solid var(--warnd);}
.bsm.gray{background:var(--bg);color:var(--gray);border:.5px solid var(--gl);}
.bsm.purple{background:var(--purple);color:#fff;}
.bsm.out{background:transparent;border:.5px solid var(--gl);color:var(--gray);}
/* FORM */
.flbl{font-size:11px;font-weight:700;color:var(--gray);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.3px;}
.finp{width:100%;background:var(--ib);border:.5px solid var(--gl);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--navy);outline:none;transition:border .15s;font-family:var(--f);}
.finp:focus{border-color:var(--blue);}
.finp::placeholder{color:var(--gray);}
.fsel{width:100%;background:var(--ib);border:.5px solid var(--gl);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--navy);outline:none;cursor:pointer;font-family:var(--f);}
.ftxt{width:100%;background:var(--ib);border:.5px solid var(--gl);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--navy);outline:none;font-family:var(--f);resize:vertical;min-height:80px;}
.fg{margin-bottom:14px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
/* TABLE */
.tbl{overflow-x:auto;margin:-2px;}
table{width:100%;border-collapse:collapse;min-width:400px;}
thead th{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px;padding:10px 14px;text-align:left;border-bottom:.5px solid var(--gl);white-space:nowrap;}
tbody tr{border-bottom:.5px solid var(--gl);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg);}
tbody td{padding:11px 14px;font-size:13px;color:var(--navy);}
.td-b{font-weight:700;}
.td-g{color:var(--gray);}
/* TOGGLE */
.toggle{width:38px;height:22px;background:var(--gl);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--blue);}
.toggle-dot{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;}
.toggle.on .toggle-dot{left:19px;}
/* CHECKBOX */
.cb-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;}
.cb-wrap input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);cursor:pointer;}
.cb-wrap label{font-size:13px;color:var(--navy);cursor:pointer;}
/* IBOX */
.ibox{background:var(--bg);border:.5px solid var(--gl);border-radius:12px;padding:13px 16px;display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.ibox.blue{background:#EEF2FF;border-color:#BFDBFE;}
.ibox.ok{background:var(--okb);border-color:var(--okd);}
.ibox.warn{background:var(--warnb);border-color:var(--warnd);}
.ibox.err{background:var(--errb);border-color:var(--errd);}
.ibox-i{font-size:20px;flex-shrink:0;}
.ibox-t{font-size:13px;color:var(--gray);line-height:1.6;}
.ibox-t strong{color:var(--navy);}
/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-h{padding:18px 22px;border-bottom:.5px solid var(--gl);display:flex;align-items:center;justify-content:space-between;}
.modal-ht{font-family:var(--fd);font-size:17px;font-weight:900;color:var(--navy);}
.modal-x{background:var(--bg);border:.5px solid var(--gl);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);font-size:15px;border-style:solid;}
.modal-b{padding:22px;}
.modal-f{padding:14px 22px;border-top:.5px solid var(--gl);display:flex;gap:10px;justify-content:flex-end;}
/* SPLIT */
.split-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.split-opt{background:var(--bg);border:2px solid var(--gl);border-radius:14px;padding:16px;cursor:pointer;transition:all .15s;}
.split-opt.sel{border-color:var(--blue);background:#EEF2FF;}
.split-opt-t{font-family:var(--fd);font-size:14px;font-weight:800;color:var(--navy);margin-bottom:4px;}
.split-opt-p{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--blue);margin-bottom:6px;}
.split-opt-d{font-size:11px;color:var(--gray);line-height:1.5;}
/* DEFI */
.defi-card{background:#fff;border-radius:16px;border:.5px solid var(--gl);padding:16px;margin-bottom:12px;transition:all .15s;cursor:pointer;}
.defi-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(59,130,246,.08);}
.defi-card.urgent{border-left:3px solid var(--err);}
/* FEUILLE MATCH */
.fm-wrap{background:#fff;border-radius:16px;border:.5px solid var(--gl);overflow:hidden;margin-bottom:16px;}
.fm-hdr{background:var(--navy);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.fm-hdr-t{font-family:var(--fd);font-size:16px;font-weight:900;color:#fff;}
.fm-hdr-s{font-size:11px;color:var(--bl);margin-top:3px;}
.fm-banner{background:var(--bl);padding:10px 20px;text-align:center;font-family:var(--fd);font-size:15px;font-weight:900;color:var(--navy);}
.fm-teams{display:grid;grid-template-columns:1fr 1fr;}
.fm-team{padding:16px;}
.fm-team:first-child{border-right:.5px solid var(--gl);}
.fm-team-name{font-family:var(--fd);font-size:14px;font-weight:900;color:var(--navy);margin-bottom:10px;padding-bottom:8px;border-bottom:.5px solid var(--bg);}
.fm-player{display:grid;grid-template-columns:24px 1fr 20px 20px 20px 20px 20px 20px;gap:3px;align-items:center;padding:5px 0;border-bottom:.5px solid var(--bg);}
.fm-player.suspended{background:var(--errb);}
.fm-player:last-child{border-bottom:none;}
.fm-num{font-weight:700;color:var(--navy);text-align:center;font-size:11px;}
.fm-pname{font-size:11px;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fm-pname.sus{color:var(--err);font-weight:700;}
.fm-cb{width:18px;height:18px;border:.5px solid var(--gl);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;transition:all .1s;}
.fm-cb.ck{background:var(--navy);border-color:var(--navy);color:#fff;}
.fm-cb.j{background:var(--warnb);border-color:var(--warnd);color:var(--warn);}
.fm-cb.r{background:var(--errb);border-color:var(--errd);color:var(--err);}
/* CLASSEMENT */
.cl-row{display:grid;grid-template-columns:28px 1fr 36px 36px 36px 36px 36px 48px;gap:4px;align-items:center;padding:10px 0;border-bottom:.5px solid var(--bg);font-size:13px;}
.cl-row.hdr{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;border-bottom:.5px solid var(--gl);}
.cl-pos{font-weight:800;color:var(--gray);text-align:center;}
.cl-pos.top{color:var(--blue);}
.cl-team{font-weight:600;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cl-v{text-align:center;color:var(--gray);}
.cl-pts{text-align:center;font-family:var(--fd);font-weight:900;color:var(--navy);}
/* NOTIF */
.notif{background:#fff;border-radius:12px;border:.5px solid var(--gl);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.notif.unread{border-left:3px solid var(--blue);background:#EEF2FF;}
/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:20px;}
.login-card{background:#fff;border-radius:24px;width:100%;max-width:420px;padding:36px 32px;}
/* PRINT */
@media print{.sidebar,.topbar,.mob-nav,.mob-topbar{display:none!important;}.app-main{margin-left:0!important;}.content{padding:0!important;}.fm-hdr{background:#000!important;-webkit-print-color-adjust:exact;}.fm-banner{background:#93C5FD!important;-webkit-print-color-adjust:exact;}}
/* RESPONSIVE */
@media(max-width:1024px){
  .sidebar{display:none;}.app-main{margin-left:0;}.topbar{display:none;}
  .mob-topbar{display:flex;}.mob-nav{display:block;}
  .content{padding:14px 14px 80px;}
  .g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}
  .fm-teams{grid-template-columns:1fr;}.fm-team:first-child{border-right:none;border-bottom:.5px solid var(--gl);}
  .split-opts{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .g2,.g3,.g4{grid-template-columns:1fr;}
  .fg2,.fg3{grid-template-columns:1fr;}
}
</style>

const Toggle=({on,fn})=>(

const FCalendrierPage=({onNav,setMatchId})=>{
  const [matchs,setMatchs]=useState(MATCHS);

  const valider=()=>{setMatchs(matchs.map(m=>m.id===valModal.id?{...m,feuille:'validee',score_d:score.d,score_v:score.v}:m));setValModal(null);};

              <div style={{fontFamily:'var(--fd)',fontSize:14,fontWeight:900,color:'var(--navy)'}}>{m.dom} vs {m.vis}</div>

function App(){

  const initRole=new URLSearchParams(window.location.search).get('role');

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        const u=session.user,um=u.user_metadata||{};
        let r=um.role||'club';
        if(u.email==='gerant@futsalbook.com')r='gerant';
        if(u.email==='fed@futsalbook.com')r='federation';
        if(u.email==='arbitre@futsalbook.com')r='arbitre';
        if(u.email==='joueur@futsalbook.com')r='joueur';
        if(u.email==='coach@futsalbook.com')r='coach';
        const nameMap2={'joueur@futsalbook.com':'Bastin Thomas','coach@futsalbook.com':'Dupont Kevin'};
        const usr={id:u.id,email:u.email,name:nameMap2[u.email]||um.name||u.email.split('@')[0],role:r,
          team:um.team||'Zebratack Charleroi (A)',division:um.division||'P3',ligue:um.ligue||'BFA',
          salle:um.salle||'CDL Lodelinsart',initials:(um.name||'U').slice(0,2).toUpperCase()};
        setUser(usr);
        setPage(getHomePage(r));
      }
    });
  },[]);

  const getHomePage=(r)=>{
    if(r==='gerant')return 'g-home';
    if(r==='federation')return 'f-home';
    if(r==='arbitre')return 'a-home';
    if(r==='joueur')return 'j-home';
    if(r==='coach')return 'coach-home';
    return 'c-home';
  };

  const login=(u)=>{setUser(u);setPage(getHomePage(u.role));};
  const logout=async()=>{await sb.auth.signOut();setUser(null);setPage('login');};

  const getMobNav=()=>MOB_NAV[user?.role]||MOB_NAV.club;

    if(page==='feuille')return 'Feuille de match';
    return PAGE_TITLES[page]||page;
  };

    if(page==='feuille'){
      if(user?.role==='arbitre')return 'a-feuilles';
      if(user?.role==='federation')return 'f-calendrier';
      return 'calendrier';
    }
    return BACK_MAP[page]||getHomePage(user?.role||'club');

      case 'reservation': return <ReservationPage salle={salle} onNav={setPage}/>;

      case 'feuille': return <FeuilleMatchPage matchId={matchId} userRole={user.role} onNav={setPage}/>;
      case 'stats': return <div className="card"><div className="card-t">📊 Statistiques</div><IBox icon="🚧">Statistiques détaillées — prochaine version.</IBox></div>;
      case 'docs': return <DocsPage fed="BFA"/>;
      case 'profil-club': return <ProfilClubPage user={user}/>;
      case 'notifs': return <NotifsPage userRole={user.role}/>;
      case 'profil': return <ProfilPage user={user} onLogout={logout}/>;

      case 'g-cren': return <GCreneauxPage/>;
      case 'g-salle': return <GSallePage user={user}/>;
      case 'g-tarifs': return <GTarifsPage/>;
      case 'g-stats': return <GStatsPage/>;
      case 'g-virements': return <div className="card"><div className="card-t">🏦 Virements</div><IBox type="ok" icon="💰">Prochain virement : <strong>260,40€</strong> — CDL Lodelinsart · J+7</IBox></div>;
      // FÉDÉRATION
      case 'f-home': return <FHome user={user} onNav={setPage}/>;
      case 'f-champ': return <FChampPage/>;
      case 'f-equipes': return <FEquipesPage/>;
      case 'f-calendrier': return <FCalendrierPage onNav={setPage} setMatchId={setMatchId}/>;
      case 'f-disc': return <FDiscPage/>;
      case 'f-transferts': return <FTransfertsPage/>;

      case 'f-facturation': return <FFacturationPage/>;

      case 'coach-effectif': return <CoachEffectifPage/>;
      case 'coach-matchs': return <CoachMatchsPage onNav={setPage} setMatchId={setMatchId}/>;
      default: return <div className="card"><IBox icon="🚧">Page en construction.</IBox></div>;
    }
  };

  if(!user||page==='login')return renderPage();

  return(
    <div className="app">
      {/* ── SIDEBAR PC ─────────────────────────────────── */}
      <div className="sidebar">
        <div className="sb-logo" onClick={()=>window.location.href='/index.html'}>
          <img src={LOGO} alt="FB" onError={e=>{e.target.style.display='none';}}/>
          <div className="sb-logo-t">FutsalBook</div>
        </div>
        <nav className="sb-nav">
          {getNav().map(section=>(
            <div key={section.sec}>
              <div className="sb-sec">{section.sec}</div>
              {section.items.map(item=>(
                <button key={item.id} className={`sni ${page===item.id||page==='feuille'&&(item.id==='calendrier'||item.id==='a-feuilles'||item.id==='f-calendrier')?'active':''}`} onClick={()=>setPage(item.id)}>
                  <span className="sni-icon">{item.icon}</span>
                  {item.label}
                  {item.badge&&<span className={`sni-badge ${item.badgeColor||''}`}>{item.badge}</span>}
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="sb-foot">
          <div className="sb-user" onClick={()=>setPage('profil')}>
            <div className="sb-av">{user.initials}</div>
            <div><div className="sb-uname">{user.name}</div><div className="sb-urole">{user.role}</div></div>
          </div>
          <button className="sni" style={{color:'rgba(239,68,68,.75)'}} onClick={logout}><span className="sni-icon">🚪</span>Déconnexion</button>
        </div>
      </div>

      {/* ── MAIN ───────────────────────────────────────── */}
      <div className="app-main">
        {/* TOPBAR PC */}
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {hasBack&&<button onClick={()=>setPage(getBack())} style={{background:'var(--bg)',border:'.5px solid var(--gl)',borderRadius:8,padding:'6px 12px',fontSize:13,fontWeight:600,color:'var(--gray)',cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'var(--f)'}} onMouseEnter={e=>{e.currentTarget.style.background='var(--bg2)';}} onMouseLeave={e=>{e.currentTarget.style.background='var(--bg)';}}>← Retour</button>}
            <div className="tb-title">{getTitle()}</div>
          </div>
          <div className="tb-right">
            {user.role==='club'&&<button className="tb-btn blue" onClick={()=>setPage('salles')}>📅 Réserver</button>}
            <div className="notif-wrap" onClick={()=>setPage('notifs')}><span style={{fontSize:22}}>🔔</span><div className="notif-dot"></div></div>
            <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>setPage('profil')}>
              <div style={{width:32,height:32,background:'var(--navy)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#fff'}}>{user.initials}</div>
              <span style={{fontSize:13,fontWeight:600,color:'var(--navy)'}}>{user.name}</span>
            </div>
          </div>
        </div>

        {/* TOPBAR MOBILE */}
        <div className="mob-topbar">
          {hasBack&&<button className="mob-back" onClick={()=>setPage(getBack())}>←</button>}
          <img src={LOGO} alt="" style={{width:26,height:26,objectFit:'contain',borderRadius:6}} onError={e=>{e.target.style.display='none';}}/>
          <div className="mob-t">{getTitle()}</div>
          <div className="notif-wrap" style={{marginLeft:'auto'}} onClick={()=>setPage('notifs')}><span style={{fontSize:20,color:'#fff'}}>🔔</span><div style={{position:'absolute',top:-1,right:-1,width:7,height:7,background:'var(--err)',borderRadius:'50%'}}></div></div>
        </div>

        {/* CONTENU */}
        <div className="content">{renderPage()}</div>

        {/* BOTTOM NAV MOBILE */}
        {!noMobNav.includes(page)&&(
          <div className="mob-nav">
            <div className="mob-nav-inner">
              {getMobNav().map(item=>(
                <button key={item.id} className={`mni ${page===item.id?'active':''}`} onClick={()=>setPage(item.id)}>
                  <span className="mni-icon">{item.icon}</span>
                  <span className="mni-lbl">{item.label}</span>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
