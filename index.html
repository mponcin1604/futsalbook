// LOGIN
const Login = ({onLogin}) => {
  const [tab, setTab] = useState("connexion");
  const [role, setRole] = useState("capitaine");
  const [showPwd, setShowPwd] = useState(false);
  const [loading, setLoading] = useState(false);
  const [alert, setAlert] = useState(null);
  const [errors, setErrors] = useState({});
  const [cf, setCf] = useState({email:"",password:""});
  const [inf, setInf] = useState({nom:"",email:"",password:""});

  const validate = (f, isc) => {
    const e={};
    if(!f.email||!f.email.includes("@")) e.email="Email invalide";
    if(!f.password||f.password.length<6) e.password="6 caractères minimum";
    if(isc&&!f.nom) e.nom="Nom requis";
    return e;
  };

  const doLogin = () => {
    const e=validate(cf,false); if(Object.keys(e).length){setErrors(e);return;}
    setErrors({}); setLoading(true); setAlert(null);
    setTimeout(()=>{
      const u=USERS.find(u=>u.email===cf.email&&u.password===cf.password);
      setLoading(false);
      if(u){setAlert({type:"success",msg:"Connexion réussie !"});setTimeout(()=>onLogin(u),600);}
      else setAlert({type:"error",msg:"Email ou mot de passe incorrect."});
    },1000);
  };

  const doSignup = () => {
    const e=validate(inf,true); if(Object.keys(e).length){setErrors(e);return;}
    setErrors({}); setLoading(true); setAlert(null);
    setTimeout(()=>{
      setLoading(false);
      const u={id:99,email:inf.email,role,name:inf.nom,initials:inf.nom.slice(0,2).toUpperCase(),team:"Mon Équipe",salle:"Ma Salle",division:"P3 BFA",stats:{joues:0,victoires:0,nuls:0,defaites:0}};
      setAlert({type:"success",msg:"Compte créé !"});
      setTimeout(()=>onLogin(u),600);
    },1000);
  };

  return (
    <div style={{background:C.bg,padding:"28px 24px 36px"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:28}}>
        <div style={{width:68,height:68,background:C.navy,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:12}}>⚽</div>
        <div style={{fontFamily:fontDisplay,fontSize:26,fontWeight:800,color:C.navy,letterSpacing:-1}}>FutsalBook</div>
        <div style={{fontSize:12,color:C.blue,fontWeight:700,marginTop:4,letterSpacing:2}}>RÉSERVE · JOUE · DÉFIE</div>
      </div>
      <div style={{background:C.white,borderRadius:20,border:`0.5px solid ${C.grayLight}`,padding:"22px 20px"}}>
        <div style={{display:"flex",background:C.grayXLight,borderRadius:12,padding:3,marginBottom:22}}>
          {["connexion","inscription"].map(t=>(
            <button key={t} onClick={()=>{setTab(t);setAlert(null);setErrors({});}}
              style={{flex:1,padding:"9px 0",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:font,background:tab===t?C.navy:"transparent",color:tab===t?C.white:C.gray}}>
              {t==="connexion"?"Connexion":"Inscription"}
            </button>
          ))}
        </div>
        {alert&&<div style={{background:alert.type==="error"?C.errorBg:C.successBg,border:`1px solid ${alert.type==="error"?"#FECACA":"#A7F3D0"}`,borderRadius:10,padding:"10px 12px",fontSize:12,fontWeight:600,color:alert.type==="error"?C.error:C.success,marginBottom:14}}>
          {alert.type==="error"?"✕":"✓"} {alert.msg}
        </div>}

        {tab==="connexion"?(
          <>
            {[{k:"email",l:"Adresse email",t:"email",ph:"ton@email.com",i:"✉️"},{k:"password",l:"Mot de passe",t:showPwd?"text":"password",ph:"••••••••",i:"🔒"}].map(f=>(
              <div key={f.k} style={S.iGroup}>
                <span style={S.label}>{f.l}</span>
                <div style={S.iWrap(!!errors[f.k])}>
                  <span>{f.i}</span>
                  <input style={S.input} type={f.t} placeholder={f.ph} value={cf[f.k]} onChange={e=>setCf({...cf,[f.k]:e.target.value})} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
                  {f.k==="password"&&<span style={{cursor:"pointer"}} onClick={()=>setShowPwd(!showPwd)}>{showPwd?"🙈":"👁️"}</span>}
                </div>
                {errors[f.k]&&<div style={{fontSize:11,color:C.error,marginTop:5}}>⚠ {errors[f.k]}</div>}
              </div>
            ))}
            <div style={{fontSize:12,color:C.blue,textAlign:"right",marginBottom:16,fontWeight:600,cursor:"pointer"}}>Mot de passe oublié ?</div>
            <button style={{...S.btnP(loading),marginBottom:18}} onClick={doLogin} disabled={loading}>{loading?"⏳ Connexion...":"Se connecter →"}</button>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{flex:1,height:0.5,background:C.grayLight}}></div>
              <span style={{fontSize:12,color:C.gray}}>ou</span>
              <div style={{flex:1,height:0.5,background:C.grayLight}}></div>
            </div>
            <div style={{display:"flex",gap:10}}>
              {["🔵 Google","🔷 Facebook"].map(s=>(
                <button key={s} style={{flex:1,background:C.inputBg,border:`1px solid ${C.grayLight}`,borderRadius:12,padding:"11px 0",fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer",fontFamily:font}}>{s}</button>
              ))}
            </div>
            <div style={{fontSize:11,color:C.gray,textAlign:"center",marginTop:14,lineHeight:1.6}}>
              Démo : <strong>matt@zebratack.be</strong> / <strong>futsal123</strong><br/>
              Gérant : <strong>gerant@jumet.be</strong> / <strong>salle123</strong>
            </div>
          </>
        ):(
          <>
            <div style={{fontSize:12,fontWeight:700,color:C.gray,marginBottom:10}}>Je suis...</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {[{id:"capitaine",icon:"🛡️",label:"Capitaine"},{id:"gerant",icon:"🏟️",label:"Gérant de salle"}].map(r=>(
                <button key={r.id} onClick={()=>setRole(r.id)} style={{flex:1,background:role===r.id?"#EEF2FF":C.inputBg,border:`${role===r.id?2:1}px solid ${role===r.id?C.navy:C.grayLight}`,borderRadius:12,padding:"12px 6px",fontSize:12,fontWeight:700,color:role===r.id?C.navy:C.gray,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:5,fontFamily:font}}>
                  <span style={{fontSize:22}}>{r.icon}</span>{r.label}
                </button>
              ))}
            </div>
            {[{k:"nom",l:"Prénom & nom",t:"text",ph:"Ton nom complet",i:"👤"},{k:"email",l:"Adresse email",t:"email",ph:"ton@email.com",i:"✉️"},{k:"password",l:"Mot de passe",t:showPwd?"text":"password",ph:"6 caractères minimum",i:"🔒"}].map(f=>(
              <div key={f.k} style={S.iGroup}>
                <span style={S.label}>{f.l}</span>
                <div style={S.iWrap(!!errors[f.k])}>
                  <span>{f.i}</span>
                  <input style={S.input} type={f.t} placeholder={f.ph} value={inf[f.k]} onChange={e=>setInf({...inf,[f.k]:e.target.value})}/>
                  {f.k==="password"&&<span style={{cursor:"pointer"}} onClick={()=>setShowPwd(!showPwd)}>{showPwd?"🙈":"👁️"}</span>}
                </div>
                {errors[f.k]&&<div style={{fontSize:11,color:C.error,marginTop:5}}>⚠ {errors[f.k]}</div>}
              </div>
            ))}
            <button style={{...S.btnP(loading),marginBottom:12}} onClick={doSignup} disabled={loading}>{loading?"⏳ Création...":"Créer mon compte →"}</button>
            <div style={{fontSize:11,color:C.gray,textAlign:"center",lineHeight:1.6}}>En t'inscrivant, tu acceptes nos <span style={{color:C.blue}}>conditions d'utilisation</span>.</div>
          </>
        )}
      </div>
    </div>
  );
};

// MAIN APP
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [salle, setSalle] = useState(null);

  const login = (u) => { setUser(u); setPage(u.role==="gerant"?"gerant-home":"dashboard"); };
  const logout = () => { setUser(null); setPage("dashboard"); };
  const noNav = ["reservation","confirmation","gerant-creneaux","gerant-salle","gerant-tarifs","gerant-stats"];

  const render = () => {
    if(!user) return <Login onLogin={login}/>;
    switch(page){
      case "dashboard": return <Dashboard user={user} onNav={setPage}/>;
      case "salles": return <Salles onNav={setPage} onSalle={setSalle}/>;
      case "reservation": return <Reservation salle={salle} onNav={setPage}/>;
      case "confirmation": return <Confirmation salle={salle} onNav={setPage}/>;
      case "defis": return <Defis/>;
      case "equipe": return <Equipe user={user}/>;
      case "profil": return <Profil user={user} onLogout={logout}/>;
      case "gerant-home": return <GerantHome user={user} onNav={setPage}/>;
      case "gerant-creneaux": return <GerantCreneaux onNav={setPage}/>;
      case "gerant-salle": return <GerantSalle user={user} onNav={setPage}/>;
      case "gerant-tarifs": return <GerantTarifs onNav={setPage}/>;
      case "gerant-stats": return <GerantStats onNav={setPage}/>;
      default: return <Dashboard user={user} onNav={setPage}/>;
    }
  };

  return (
    <div style={S.wrap}>
      <div style={S.phone}>
        <StatusBar/>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflowY:"hidden"}}>
          {render()}
        </div>
        {user&&!noNav.includes(page)&&<NavBar active={page} onNav={setPage} role={user.role}/>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
